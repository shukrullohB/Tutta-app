services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: tutta_db
      POSTGRES_USER: tutta_user
      POSTGRES_PASSWORD: tutta_pass
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    depends_on:
      - db

volumes:
  pg_data:
