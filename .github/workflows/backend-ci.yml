name: Backend CI

on:
  push:
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Django check
        env:
          USE_SQLITE: "True"
          SECRET_KEY: "ci-super-secret-key-at-least-32-characters-long"
          DEBUG: "False"
        run: python manage.py check

      - name: Migration check
        env:
          USE_SQLITE: "True"
          SECRET_KEY: "ci-super-secret-key-at-least-32-characters-long"
          DEBUG: "False"
        run: python manage.py makemigrations --check --dry-run

      - name: Run tests
        env:
          USE_SQLITE: "True"
          SECRET_KEY: "ci-super-secret-key-at-least-32-characters-long"
          DEBUG: "False"
          SECURE_SSL_REDIRECT: "False"
        run: python manage.py test apps.users apps.listings apps.bookings apps.reviews apps.chat apps.payments -v 1

      - name: Generate OpenAPI schema
        env:
          USE_SQLITE: "True"
          SECRET_KEY: "ci-super-secret-key-at-least-32-characters-long"
          DEBUG: "False"
        run: python manage.py spectacular --file openapi-schema.yml
