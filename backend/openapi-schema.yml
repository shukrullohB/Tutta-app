components:
  schemas:
    Booking:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        listing:
          type: integer
        listing_title:
          type: string
          readOnly: true
        guest_id:
          type: integer
          readOnly: true
        host_id:
          type: integer
          readOnly: true
        start_date:
          type: string
          format: date
        end_date:
          type: string
          format: date
        total_price:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
          readOnly: true
        status:
          allOf:
          - $ref: '#/components/schemas/BookingStatusEnum'
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - end_date
      - guest_id
      - host_id
      - id
      - listing
      - listing_title
      - start_date
      - status
      - total_price
    BookingCancelResponse:
      type: object
      properties:
        booking_id:
          type: integer
        status:
          type: string
        detail:
          type: string
      required:
      - booking_id
      - detail
      - status
    BookingConfirmResponse:
      type: object
      properties:
        booking_id:
          type: integer
        status:
          type: string
        detail:
          type: string
      required:
      - booking_id
      - detail
      - status
    BookingCreate:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        listing:
          type: integer
        start_date:
          type: string
          format: date
        end_date:
          type: string
          format: date
        total_price:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
          readOnly: true
        status:
          allOf:
          - $ref: '#/components/schemas/BookingStatusEnum'
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - end_date
      - id
      - listing
      - start_date
      - status
      - total_price
    BookingStatusEnum:
      enum:
      - pending
      - confirmed
      - cancelled
      type: string
      description: |-
        * `pending` - Pending
        * `confirmed` - Confirmed
        * `cancelled` - Cancelled
    GoogleLogin:
      type: object
      properties:
        id_token:
          type: string
        access_token:
          type: string
        email:
          type: string
          format: email
        display_name:
          type: string
      required:
      - id_token
    GoogleLoginResponse:
      type: object
      properties:
        access:
          type: string
        refresh:
          type: string
        user:
          $ref: '#/components/schemas/User'
      required:
      - access
      - refresh
      - user
    HealthCheckResponse:
      type: object
      properties:
        status:
          type: string
        database:
          type: string
        timestamp:
          type: string
          format: date-time
      required:
      - database
      - status
      - timestamp
    Listing:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        host_id:
          type: integer
          readOnly: true
        title:
          type: string
          maxLength: 255
        description:
          type: string
        location:
          type: string
          maxLength: 255
        listing_type:
          $ref: '#/components/schemas/ListingTypeEnum'
        price_per_night:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
        max_guests:
          type: integer
          maximum: 2147483647
          minimum: 0
        is_active:
          type: boolean
          readOnly: true
        images:
          type: array
          items:
            $ref: '#/components/schemas/ListingImage'
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - description
      - host_id
      - id
      - images
      - is_active
      - listing_type
      - location
      - price_per_night
      - title
      - updated_at
    ListingCreate:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        title:
          type: string
          maxLength: 255
        description:
          type: string
        location:
          type: string
          maxLength: 255
        listing_type:
          $ref: '#/components/schemas/ListingTypeEnum'
        price_per_night:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
        max_guests:
          type: integer
          maximum: 2147483647
          minimum: 0
        image_files:
          type: array
          items:
            type: string
            format: uri
          writeOnly: true
        remove_image_ids:
          type: array
          items:
            type: integer
            minimum: 1
          writeOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
